name: Package Mongo Admin Base Images

on: workflow_dispatch

jobs:
  pack-images:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取纯血官方镜像
        run: |
          docker pull python:3.12-slim
          docker pull node:20-alpine
          docker pull nginx:alpine
          
      - name: 将3个镜像打包成1个离线文件
        run: |
          docker save -o mongo-admin-base-images.tar python:3.12-slim node:20-alpine nginx:alpine
          
      - name: 传到 Artifacts 供下载
        uses: actions/upload-artifact@v4
        with:
          name: mongo-admin-base-images
          path: mongo-admin-base-images.tar
