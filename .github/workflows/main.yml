name: Package Mongo Admin Base Images

on: workflow_dispatch

jobs:
  pack-images:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取纯血官方镜像
        run: |
          docker pull python:3.12-slim
          docker pull node:20-alpine
          docker pull nginx:alpine
          
      - name: 将3个镜像打包成1个离线文件
        run: |
          docker save -o mongo-admin-base-images.tar python:3.12-slim node:20-alpine nginx:alpine
          
      - name: 传到 Artifacts 供下载
        uses: actions/upload-artifact@v4
        with:
          name: mongo-admin-base-images
          path: mongo-admin-base-images.tar
      - name: 生成服务器直链
        run: |
          echo "========================================================="
          echo "正在生成一条给服务器用的直链，请稍后..."
          result=$(curl -s https://bashupload.com/mongo-admin-base-images.tar -T mongo-admin-base-images.tar)
          echo "========================================================="
          echo "大佬，去看看上面的日志，去服务器执行里面吐出的那句 wget 就会直接秒下！"
          echo "========================================================="
